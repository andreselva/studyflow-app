name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  security:
    name: Segurança de dependências
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout (histórico completo para scan de secrets)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verificar presença do package-lock.json
        run: |
          if [ ! -f package-lock.json ]; then
            echo "::error::package-lock.json ausente. Commite o lockfile para garantir builds reproduzíveis e auditáveis."
            exit 1
          fi
          echo "package-lock.json presente."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências (sem lifecycle scripts)
        run: npm ci --ignore-scripts

      - name: Auditoria de vulnerabilidades (npm audit)
        run: npm audit --audit-level=high

      - name: Dependency review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4

      - name: Scan de secrets (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: security
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: ESLint
        run: npm run lint

  build-and-test:
    name: Build e testes unitários
    runs-on: ubuntu-latest
    needs: security
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Build
        run: npm run build

      - name: Testes unitários
        run: npm run test
